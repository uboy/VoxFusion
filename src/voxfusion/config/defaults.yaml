# VoxFusion Default Configuration
# These values are used when no user/project config is present.

capture:
  sources:
    - microphone
  sample_rate: 16000
  channels: 1
  chunk_duration_ms: 500
  buffer_size: 10
  lossy_mode: false

asr:
  engine: faster-whisper
  model_size: small
  device: auto
  compute_type: int8
  beam_size: 5
  best_of: 5
  patience: 1.0
  language: null       # null = auto-detect
  initial_prompt: null
  word_timestamps: false
  vad_filter: true
  vad_parameters:
    threshold: 0.5
    min_speech_duration_ms: 250
    min_silence_duration_ms: 2000
  chunk_duration_s: 5
  chunk_overlap_s: 1

diarization:
  strategy: channel
  channel_map:
    microphone: SPEAKER_LOCAL
    system: SPEAKER_REMOTE
  ml:
    engine: pyannote
    model: pyannote/speaker-diarization-3.1
    hf_auth_token: null
    device: auto
    min_speakers: null
    max_speakers: null
    min_segment_duration: 0.5

translation:
  enabled: false
  target_language: en
  backend: argos
  cache:
    enabled: true
    max_size: 10000
    ttl: 3600

output:
  format: json
  include_word_timestamps: false
  include_translation: true
  include_confidence: true

security:
  encrypt_output: false
  encryption_passphrase: null
  log_transcription_content: false
  telemetry: false
  auto_delete_temp_files: true
  temp_file_ttl_hours: 24

log_level: INFO
data_dir: ~/.voxfusion
